<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Viranga Sandaruwan | Portfolio</title>
    <style>
        :root {
            --black: #000000;
            --red: #ff0000;
            --gray: #888888;
            --white: #ffffff;
            --dark-gray: #1a1a1a;
            --glow-red: rgba(255, 0, 0, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--black);
            color: var(--white);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated subtle red glow background */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 20% 20%, rgba(255,0,0,0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: -2;
        }

        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,0,0,0.1);
        }

        .logo {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--red);
            letter-spacing: 2px;
        }

        nav {
            display: flex;
            gap: 2.5rem;
        }

        nav a {
            color: var(--white);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        nav a:hover {
            color: var(--red);
            transform: translateY(-2px);
        }

        .btn-contact {
            background: var(--red);
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s ease;
        }

        .btn-contact:hover {
            background: transparent;
            border: 2px solid var(--red);
            color: var(--red);
            transform: scale(1.05);
        }

        main {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5%;
            position: relative;
        }

        .content {
            text-align: center;
            z-index: 10;
            max-width: 90%;
        }

        .welcome-universe {
            font-size: clamp(4rem, 12vw, 12rem);
            font-weight: 900;
            background: linear-gradient(90deg, var(--red), #ff4d4d, #ff0000, #cc0000);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            background-size: 300%;
            animation: textRedGlow 6s ease infinite;
            line-height: 0.95;
            text-shadow: 0 0 40px rgba(255,0,0,0.5);
            margin-bottom: 1.5rem;
        }

        @keyframes textRedGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 300% 50%; }
            100% { background-position: 0% 50%; }
        }

        .description {
            font-size: 1.4rem;
            max-width: 700px;
            margin: 0 auto 2.5rem;
            color: var(--gray);
            line-height: 1.7;
        }

        .buttons {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 1rem 2.5rem;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.4s ease;
            font-size: 1.1rem;
        }

        .btn-primary {
            background: var(--red);
            color: white;
            box-shadow: 0 0 20px var(--glow-red);
        }

        .btn-primary:hover {
            background: transparent;
            border: 2px solid var(--red);
            color: var(--red);
            transform: translateY(-5px);
            box-shadow: 0 0 40px var(--glow-red);
        }

        .btn-outline {
            border: 2px solid var(--gray);
            color: var(--gray);
        }

        .btn-outline:hover {
            border-color: var(--red);
            color: var(--red);
            transform: translateY(-5px);
        }

        /* Robot - background transparent කරලා text එක පිටුපසට */
        spline-viewer {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: -1;           /* text එකට පිටුපසට යන්න z-index අඩු කළා */
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 5;           /* text එක robot එකට ඉස්සරහට එනවා */
        }

        /* Mobile responsive */
        @media (max-width: 900px) {
            .welcome-universe { font-size: clamp(3.5rem, 15vw, 7rem); }
            .buttons { flex-direction: column; gap: 1rem; }
            nav { gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
        }
    </style>
</head>
<body>
    <header>
        <h1 class="logo">Viranga</h1>
        <nav>
            <a href="#">About</a>
            <a href="#">Experience</a>
            <a href="#">Skills</a>
            <a href="#">Projects</a>
        </nav>
        <button class="btn-contact">Contact</button>
    </header>

    <main>
        <div class="content">
            <h1 class="welcome-universe">WELCOME TO MY UNIVERSE</h1>
            <p class="description">
                I'm <b>Viranga Sandaruwan</b>, a passionate student<br>
                crafting high-performance, user-centric digital experiences.
            </p>
            <div class="buttons">
                <a href="#" class="btn btn-primary">GET RESUME →</a>
                <a href="#" class="btn btn-outline">LET'S COLLABORATE →</a>
            </div>
        </div>

        <!-- Robot - background transparent, text එකට පිටුපසට -->
        <spline-viewer 
            url="https://prod.spline.design/ugBEkJJe34wTifaW/scene.splinecode"
            class="robot-3d">
        </spline-viewer>
    </main>

    <!-- Spline Viewer Script -->
    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.9.2/build/spline-viewer.js"></script>
</body>
</html>
